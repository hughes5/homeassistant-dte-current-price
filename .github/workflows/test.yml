name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt ruff

      - name: Lint with ruff
        run: ruff check scripts/ tests/

      - name: Run tests
        run: pytest tests/ -v
