name: Update PSCR

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
    inputs:
      publish_release_assets:
        description: "Create or update release assets even when rates are unchanged"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt ruff

      - name: Lint with ruff
        run: ruff check scripts/ tests/

      - name: Run tests
        run: pytest tests/ -v

      - name: Save current PDF hash
        id: old-pdf
        run: |
          if [ -f tests/fixtures/dtee1cur.pdf ]; then
            echo "hash=$(sha256sum tests/fixtures/dtee1cur.pdf | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          else
            echo "hash=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Update PSCR from rate book PDF
        id: update
        run: python scripts/update_pscr.py --release-notes

      - name: Validate live PDF against tests
        run: |
          cp /tmp/dtee1cur.pdf tests/fixtures/dtee1cur.pdf
          pytest tests/test_pdf_extraction.py -v

      - name: Check for changes
        id: changed
        run: |
          new_hash=$(sha256sum tests/fixtures/dtee1cur.pdf | cut -d' ' -f1)
          if [ "${{ steps.old-pdf.outputs.hash }}" = "$new_hash" ]; then
            echo "pdf=false" >> "$GITHUB_OUTPUT"
          else
            echo "pdf=true" >> "$GITHUB_OUTPUT"
          fi
          if git diff --quiet rates/data.yaml; then
            echo "pscr=false" >> "$GITHUB_OUTPUT"
          else
            echo "pscr=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Read PSCR metadata
        id: effective-date
        run: |
          tag_suffix=$(python3 -c "import yaml; print(yaml.safe_load(open('pscr_metadata.yaml'))['tag_suffix'])")
          name_str=$(python3 -c "import yaml; print(yaml.safe_load(open('pscr_metadata.yaml'))['name'])")
          echo "tag_suffix=$tag_suffix" >> "$GITHUB_OUTPUT"
          echo "name=$name_str" >> "$GITHUB_OUTPUT"

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        id: auto-commit
        with:
          commit_message: "Update PSCR factor from DTE rate book PDF"
          commit_user_name: "DTE Rate Bot"
          commit_user_email: "actions@github.com"
          commit_author: "hughes5 <6740468+hughes5@users.noreply.github.com>"

      - name: Check for any existing release
        id: check-release
        run: |
          count=$(gh release list --json tagName --jq 'length' 2>/dev/null || echo "0")
          if [ "$count" -gt 0 ]; then
            echo "any_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Summary
        run: |
          echo "### PSCR Update Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- PDF changed: ${{ steps.changed.outputs.pdf }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- PSCR changed: ${{ steps.changed.outputs.pscr }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Committed: ${{ steps.auto-commit.outputs.changes_detected }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Create release
        if: steps.auto-commit.outputs.changes_detected == 'true' || steps.check-release.outputs.any_exists == 'false' || inputs.publish_release_assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pscr-${{ steps.effective-date.outputs.tag_suffix }}
          name: "PSCR Update — ${{ steps.effective-date.outputs.name }}"
          body_path: RELEASE_NOTES.md
          overwrite_files: true
          files: |
            d1.1.yaml
            d1.2.yaml
            d1.7.yaml
            d1.11.yaml
