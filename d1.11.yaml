template:
  - sensor:
      - name: "D1.11 Inflow"
        unique_id: "d1_11_inflow"
        unit_of_measurement: "USD/kWh"
        device_class: monetary
        state: >
          {# Total marginal rates from the Michigan Public Service Commission DTE tariff,
             including D1.11 Standard Time-of-Use base energy charges, the D1.11 distribution charge,
             C8.5 power supply surcharge totals, and C9.8 delivery surcharge totals.
             Fixed monthly service charges are excluded from the per-kWh marginal rate.
             PSCR factor: 18.770 mills/kWh
             C8.5 total supply surcharge: 2.1283¢/kWh
             See https://github.com/hughes5/homeassistant-dte-current-price
             for source data and automated rate updates.
          #}
          {% set month = now().month %}
          {% if is_state('binary_sensor.d1_11_peak_hours', 'on') %}
            {% if month in [10, 11, 12, 1, 2, 3, 4, 5] %}
              {{ 0.23149 }}
            {% else %}
              {{ 0.27237 }}
            {% endif %}
          {% else %}
            {{ 0.21539 }}
          {% endif %}
  - sensor:
      - name: "D1.11 Outflow"
        unique_id: "d1_11_outflow"
        unit_of_measurement: "USD/kWh"
        device_class: monetary
        state: >
          {# Rider 18 outflow credit = power supply + PSCR, per DTE Rate Book Sheet D-115.00. #}
          {% set month = now().month %}
          {% if is_state('binary_sensor.d1_11_peak_hours', 'on') %}
            {% if month in [10, 11, 12, 1, 2, 3, 4, 5] %}
              0.12196
            {% else %}
              0.16284
            {% endif %}
          {% else %}
            {% if month in [10, 11, 12, 1, 2, 3, 4, 5] %}
              0.10586
            {% else %}
              0.10586
            {% endif %}
          {% endif %}
  - binary_sensor:
      - name: "D1.11 Peak Hours"
        unique_id: "d1_11_peak_hours"
        device_class: power
        state: >
          {% set hour = now().hour %}
          {% set day_of_week = now().isoweekday() %}
          {{ day_of_week in [1,2,3,4,5] and hour >= 15 and hour < 19 }}
