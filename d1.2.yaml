template:
  - sensor:
      - name: "D1.2 Inflow"
        unique_id: "d1_2_inflow"
        unit_of_measurement: "USD/kWh"
        device_class: monetary
        state: >
          {# Total marginal rates from the Michigan Public Service Commission DTE tariff,
             including D1.2 Enhanced Time-of-Use base energy charges, the D1.2 distribution charge,
             C8.5 power supply surcharge totals, and C9.8 delivery surcharge totals.
             Fixed monthly service charges are excluded from the per-kWh marginal rate.
             PSCR factor: 18.770 mills/kWh
             C8.5 total supply surcharge: 2.0501¢/kWh
             See https://github.com/hughes5/homeassistant-dte-current-price
             for source data and automated rate updates.
          #}
          {% set month = now().month %}
          {% set day_of_week = now().isoweekday() %}
          {% set hour = now().hour %}
          {% if month in [10, 11, 12, 1, 2, 3, 4, 5] and hour >= 11 and hour < 19 and day_of_week in [1, 2, 3, 4, 5] %}
            {{ 0.26427 }}
          {% elif month in [10, 11, 12, 1, 2, 3, 4, 5] %}
            {{ 0.17981 }}
          {% elif hour >= 11 and hour < 19 and day_of_week in [1, 2, 3, 4, 5] %}
            {{ 0.28943 }}
          {% else %}
            {{ 0.18196 }}
          {% endif %}
  - sensor:
      - name: "D1.2 Outflow"
        unique_id: "d1_2_outflow"
        unit_of_measurement: "USD/kWh"
        device_class: monetary
        state: >
          {# This outflow rate is a sell-back estimate and is not derived from the D1.2 tariff marginal-cost accounting above. #}
          {% set month = now().month %}
          {% set day_of_week = now().isoweekday() %}
          {% set hour = now().hour %}
          {% if month in [10, 11, 12, 1, 2, 3, 4, 5] and hour >= 11 and hour < 19 and day_of_week in [1, 2, 3, 4, 5] %}
            0.1321
          {% elif month in [10, 11, 12, 1, 2, 3, 4, 5] %}
            0.05059
          {% elif hour >= 11 and hour < 19 and day_of_week in [1, 2, 3, 4, 5] %}
            0.15369
          {% else %}
            0.05265
          {% endif %}
