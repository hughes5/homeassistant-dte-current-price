template:
  - sensor:
      - name: "D1.7 Inflow"
        unique_id: "d1_7_inflow"
        unit_of_measurement: "USD/kWh"
        device_class: monetary
        state: >
          {# Total marginal rates from the Michigan Public Service Commission DTE tariff,
             including D1.7 Geothermal Time-of-Day base energy charges, the D1.7 distribution charge,
             C8.5 power supply surcharge totals, and C9.8 delivery surcharge totals.
             Fixed monthly service charges are excluded from the per-kWh marginal rate.
             PSCR factor: 18.770 mills/kWh
             C8.5 total supply surcharge: 2.0252¢/kWh
             See https://github.com/hughes5/homeassistant-dte-current-price
             for source data and automated rate updates.
          #}
          {% set month = now().month %}
          {% if is_state('binary_sensor.d1_7_peak_hours', 'on') %}
            {% if month in [10, 11, 12, 1, 2, 3, 4, 5] %}
              {{ 0.18677 }}
            {% else %}
              {{ 0.26524 }}
            {% endif %}
          {% else %}
            {% if month in [10, 11, 12, 1, 2, 3, 4, 5] %}
              {{ 0.17398 }}
            {% else %}
              {{ 0.17284 }}
            {% endif %}
          {% endif %}
  - binary_sensor:
      - name: "D1.7 Peak Hours"
        unique_id: "d1_7_peak_hours"
        device_class: power
        state: >
          {% set hour = now().hour %}
          {% set day_of_week = now().isoweekday() %}
          {{ day_of_week in [1,2,3,4,5] and hour >= 11 and hour < 19 }}
